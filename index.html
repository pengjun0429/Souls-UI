<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Souls UI Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="padding: 50px; max-width: 800px; margin: auto;">
        <h1 style="text-align: center; color: var(--souls-gold); font-size: 3rem;">SOULS UI</h1>
        
        <section class="glass-card">
            <h2>篝火已點燃 (Bonfire Lit)</h2>
            <p>這是一個結合玻璃擬態與黑魂視覺的組件展示。</p>
            
            <div style="margin-top: 20px;">
                <button class="souls-btn">進入霧門</button>
            </div>
            
            <div style="margin-top: 30px;">
                <label>生命值 (HP)</label>
                <div class="souls-progress-container">
                    <div class="souls-progress-bar"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
